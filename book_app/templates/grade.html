<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% if marks > 90 %}
    <h1> Grade A</h1>
{% elif marks <= 90 and marks > 80 %}
    <h1> Grade B</h1>
{% elif marks <= 80 and marks > 70 %}
    <h1> Grade C</h1>
{% elif marks <= 70 and marks > 60 %}
    <h1> Grade D</h1>
{% elif marks <= 60 and marks > 50 %}
    <h1> Grade E</h1>
{% else %}
    <h1> Grade F</h1>
{% endif %}



</body>
</html>
